<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Юля & Андрей — 17.06.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#F3EDE6;
--paper:#FFF9F5;
--text:#2B2B2B;
--muted:#8C8686;
--accent:#E595AD;
--line:#EADFD9;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.65;
}

/* фон */

body::before{
content:"";
position:fixed;
inset:0;
background:url("flowers-bg.jpg") repeat;
background-size:320px;
opacity:0.03;
pointer-events:none;
z-index:-1;
}

/* HERO */

.hero{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,.30), rgba(0,0,0,.45)),
url("hero.png") center/cover no-repeat;

color:white;
margin-left:calc(-50vw + 50%);
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:72px;
margin:0;
}

.hero-date{
margin-top:15px;
letter-spacing:4px;
font-size:22px;
}

.hero-place{
margin-top:10px;
font-size:18px;
}

/* контейнер */

.invitation{
max-width:860px;
margin:-80px auto 80px;
padding:30px;
background:var(--paper);
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.06);
}

/* блоки */

.block{
padding:40px 10px;
text-align:center;
}

.block + .block{
border-top:1px solid var(--line);
}

h2{
font-family:'Playfair Display',serif;
margin:0 0 20px;
font-size:38px;
color:#C77C96;
}

/* календарь */

.calendar{
display:grid;
grid-template-columns:repeat(5,60px);
gap:12px 18px;
justify-content:center;
margin-top:20px;
}

.weekday{
text-align:center;
font-size:13px;
color:#A69B9B;
font-weight:500;
}

.day{
height:46px;
display:flex;
align-items:center;
justify-content:center;
font-weight:500;
font-size:18px;
color:#6B6363;
position:relative;
}

.day.active{
color:white;
}

@keyframes heartBeat{
0%{transform:scale(1);}
25%{transform:scale(1.12);}
40%{transform:scale(1);}
60%{transform:scale(1.12);}
100%{transform:scale(1);}
}

.day.active svg{
position:absolute;
width:44px;
height:44px;
z-index:1;
animation:heartBeat 1.6s infinite;
transform-origin:center;
transform: translateY(-3px);
}

.day.active span{
position:relative;
z-index:2;
font-weight:600;
}

/* таймер */

.countdown{
margin-top:24px;
font-size:18px;
color:#C77C96;
}

/* тайминг */

.timeline{
max-width:420px;
margin:auto;
}

.timeline-item{
margin:25px 0;
}

.timeline-time{
font-size:28px;
color:#C77C96;
}

.timeline-text{
color:var(--muted);
}

/* фото */

.place-photo{
width:100%;
border-radius:18px;
margin:20px 0 15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* дресс код */

.colors{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:18px;
}

.color{
width:clamp(36px, 9vw, 46px);
height:clamp(36px, 9vw, 46px);
border-radius:50%;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* кнопка */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 24px;
border-radius:999px;
background:var(--accent);
color:white;
text-decoration:none;
transition:0.2s;
}

.btn:hover{
background:#D9849F;
}

/* форма */

.form-wrap{
margin-top:20px;
border-radius:18px;
overflow:hidden;
border:1px solid #EFE6E2;
}

iframe{
width:100%;
height:1450px;
border:0;
}

/* лепестки сакуры */

.petal{
position:fixed;
top:-12vh;
pointer-events:none;
z-index:9999;
will-change:transform, opacity;
filter:blur(0.2px);
}

.petal::before{
content:"";
display:block;
width:100%;
height:100%;
background:linear-gradient(135deg,#FBE1EA 0%,#F7BDD0 55%,#E8A0B7 100%);
border-radius:72% 0 72% 72%;
box-shadow:
inset -1px -1px 2px rgba(255,255,255,0.45),
0 2px 6px rgba(229,149,173,0.12);
transform:rotate(-25deg);
}

@keyframes petalFall{
0%{
transform:translate3d(0,-12vh,0) rotate(0deg);
opacity:0;
}
10%{
opacity:0.9;
}
25%{
transform:translate3d(14px,22vh,0) rotate(70deg);
}
50%{
transform:translate3d(-12px,52vh,0) rotate(150deg);
}
75%{
transform:translate3d(18px,80vh,0) rotate(240deg);
}
100%{
transform:translate3d(-8px,112vh,0) rotate(320deg);
opacity:0.75;
}
}

@keyframes petalSway{
0%{margin-left:0;}
25%{margin-left:10px;}
50%{margin-left:24px;}
75%{margin-left:8px;}
100%{margin-left:0;}
}

/* финал */

.final{
text-align:center;
padding:70px 20px;
font-family:'Playfair Display',serif;
font-size:32px;
color:#C77C96;
}

@media (max-width:700px){

.hero h1{
font-size:42px;
}

.invitation{
margin:-40px 15px 40px;
padding:20px;
}

.calendar{
grid-template-columns:repeat(5,50px);
}

}

</style>
</head>

<body>

<!-- остальной HTML и JS код полностью без изменений -->

</body>
</html>
